<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla+ Modpack</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316161f' stroke='%2322222e' stroke-width='2'/%3E%3Cpath d='M16 8 L24 22 L8 22 Z' fill='%2310b981'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23ffffff'/%3E%3C/svg%3E">

    <meta property="og:title" content="Vanilla+ Modpack Platform">
    <meta property="og:description" content="A clean, high-performance optimization baseline configuration for Minecraft.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#10b981">

    <style>
        :root {
            --bg-primary: #0d0d11;
            --bg-secondary: #16161f;
            --border-color: #22222e;
            --text-primary: #ffffff;
            --text-secondary: #9494a8;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.08);
            --accent-hover: #059669;
            --support-color: #ff5e5b;
            --support-glow: rgba(255, 94, 91, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 550px;
            margin: 0 auto;
        }

        .controls-container {
            max-width: 600px;
            margin: 0 auto 2.5rem auto;
            display: flex;
            gap: 0.75rem;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .search-wrapper {
            flex-grow: 1;
        }

        #modSearch {
            width: 100%;
            padding: 1rem 1.25rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        #modSearch:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow), 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-download, .btn-support {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffffff;
            text-decoration: none;
            padding: 0 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 14px;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .btn-download {
            background-color: var(--accent);
            color: #050505;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.15);
        }

        .btn-download:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(16, 185, 129, 0.25);
        }

        .btn-support {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .btn-support:hover {
            color: #ffffff;
            border-color: var(--support-color);
            background-color: rgba(255, 94, 91, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px var(--support-glow);
        }

        .btn-download:active, .btn-support:active {
            transform: translateY(0);
        }

        .btn-download svg, .btn-support svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .mod-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        @media (min-width: 700px) {
            .mod-list {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }

        .mod-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            opacity: 0;
            animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
        }

        .mod-item:hover {
            border-color: #2d2d3d;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .mod-info {
            flex-grow: 1;
        }

        .mod-info strong {
            font-size: 1.05rem;
            font-weight: 600;
            display: block;
            margin-bottom: 0.25rem;
        }

        .mod-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .mod-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.03);
            transition: all 0.2s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -0.15rem;
        }

        .mod-link:hover {
            color: #050505;
            background-color: var(--accent);
            transform: scale(1.05);
        }

        .mod-link:active {
            transform: scale(0.95);
        }

        .mod-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.96) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 700px) {
            .app-container { padding: 2.5rem 1rem; }
            h1 { font-size: 2rem; }
            .controls-container { flex-direction: column; }
            .btn-download, .btn-support { padding: 1rem; justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Vanilla+ Modpack</h1>
            <p class="subtitle">A clean, high-performance optimization pack that keeps the game feeling completely original while making it run flawlessly.</p>
        </header>

        <main>
            <div class="controls-container">
                <div class="search-wrapper">
                    <input type="text" id="modSearch" placeholder="Search the mod list..." aria-label="Search mods">
                </div>
                <a href="https://ko-fi.com/im4theone" target="_blank" rel="noopener noreferrer" class="btn-support" title="Support development">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    Support
                </a>
                <a href="download.html" class="btn-download">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 20h14v-2H5v2zm14-9h-4V3H9v8H5l7 7 7-7z"/>
                    </svg>
                    Download Pack
                </a>
            </div>

            <ul id="modContainer" class="mod-list"></ul>
        </main>
    </div>

    <script>
        'use strict';

        document.addEventListener('DOMContentLoaded', () => {
            const modData = [
                { name: 'AppleSkin', url: 'https://modrinth.com/mod/EsAfCjCV', description: 'Adds food saturation and hunger info right to your visual HUD.' },
                { name: 'Architectury', url: 'https://modrinth.com/mod/lhGA9TYQ', description: 'An internal link system that helps separate mods run together smoothly.' },
                { name: 'Cloth Config', url: 'https://modrinth.com/mod/9s6osm5g', description: 'An underlying menu screen framework required by various mods.' },
                { name: 'Distant Horizons', url: 'https://modrinth.com/mod/uCdwusMi', description: 'Allows massive, endless view distances without tanking your computer performance.' },
                { name: 'Fabric API', url: 'https://modrinth.com/mod/P7dR8mSH', description: 'The essential base engine that allows mods to hook into the game.' },
                { name: 'Fast IP Ping', url: 'https://modrinth.com/mod/9mtu0sUO', description: 'Speeds up server list loading times and connection pings.' },
                { name: 'Lithium', url: 'https://modrinth.com/mod/gvQqBUqZ', description: 'Optimizes physics and game logic behind the scenes to fix stuttering.' },
                { name: 'Mod Menu', url: 'https://modrinth.com/mod/mOgUt4GM', description: 'Adds a clean configuration interface screen directly inside your options.' },
                { name: 'Mouse Tweaks', url: 'https://modrinth.com/mod/aC3cM3Vq', description: 'Improves inventory item handling, allowing dragging to sort or move blocks easily.' },
                { name: 'No Chat Reports', url: 'https://modrinth.com/mod/qQyHxfxd', description: 'Protects player privacy by removing tracking data signatures from messages.' },
                { name: 'NotEnoughAnimations', url: 'https://modrinth.com/mod/MPCX6s5C', description: 'Adds seamless body animations for actions like eating, climbing, and rowing.' },
                { name: 'Placeholder API', url: 'https://modrinth.com/mod/eXts2L7r', description: 'A lightweight support tool for displaying custom dynamic text profiles.' },
                { name: 'Reese\'s Sodium Options', url: 'https://modrinth.com/mod/Bh37bMuy', description: 'Cleans up and improves the graphic options menu layout.' },
                { name: 'Roughly Enough Items', url: 'https://modrinth.com/mod/nfn13YXA', description: 'An in-game sidebar guide to easily look up item recipes and crafting blocks.' },
                { name: 'Sodium', url: 'https://modrinth.com/mod/AANobbMI', description: 'A massive graphics engine upgrade that drastically increases your frame rate.' },
                { name: 'Sodium Extra', url: 'https://modrinth.com/mod/PtjYWJkn', description: 'Unlocks extra fine-grained visual customization toggles for performance tuning.' },
                { name: 'Xaero\'s Minimap', url: 'https://modrinth.com/mod/1bokaNcj', description: 'A clean, on-screen radar map showing local surroundings and entities.' },
                { name: 'Xaero\'s World Map', url: 'https://modrinth.com/mod/NcUtCpym', description: 'A full-screen interactive world map tracking explored areas.' }
            ];

            const container = document.getElementById('modContainer');
            const searchInput = document.getElementById('modSearch');

            const render = (filterString = '') => {
                container.innerHTML = '';
                const lowerFilter = filterString.toLowerCase();
                
                const filteredData = modData.filter(mod => 
                    mod.name.toLowerCase().includes(lowerFilter) || 
                    mod.description.toLowerCase().includes(lowerFilter)
                );

                const fragment = document.createDocumentFragment();
                
                filteredData.forEach((mod, index) => {
                    const li = document.createElement('li');
                    li.className = 'mod-item';
                    li.style.animationDelay = `${index * 0.02}s`;
                    li.innerHTML = `
                        <div class="mod-info">
                            <strong>${mod.name}</strong>
                            <div class="mod-desc">${mod.description}</div>
                        </div>
                        <a href="${mod.url}" target="_blank" rel="noopener noreferrer" class="mod-link" title="View on Modrinth">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
                            </svg>
                        </a>
                    `;
                    fragment.appendChild(li);
                });
                
                container.appendChild(fragment);
            };

            searchInput.addEventListener('input', (event) => {
                render(event.target.value);
            });

            render();
        });
    </script>
</body>
</html>
